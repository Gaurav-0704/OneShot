# Default search — edit this in the Search tab of the app, or here directly.
# These are neutral starter values; change them to match your own job hunt.
search_terms:
- Software Engineer
- Data Analyst
- Product Manager
locations:
- United States
- Remote
# Positive geo filter: only keep jobs in these countries. Leave empty to
# disable. remote_scope "country" drops foreign remote leaks; "worldwide"
# keeps remote jobs from anywhere.
allowed_countries:
- United States
allowed_regions: []
remote_scope: country
# Only surface jobs not seen in a prior run. Set false to show all.
fresh_only: true
remote: true
hybrid: true
onsite: false
experience_level: mid_senior_level
job_types:
- fulltime
# Freshest-first: starts at this window and auto-widens if nothing is found.
date_posted: week
distance_miles: 50
results_per_site: 25
# More than one board improves results, especially on hosted servers where a
# single board may block the IP.
sites:
- linkedin
- indeed
- google
country_indeed: usa
blacklists:
  title_keywords: []
  companies: []
  description_keywords: []
  locations: []
salary:
  minimum_usd_annual: 0
  desired_usd_annual: 0
fit_score:
  enabled: true
  min_score: 6
